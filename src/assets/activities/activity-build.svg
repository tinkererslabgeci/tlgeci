<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="28" fill="url(#bg)"/>

  <!-- workbench -->
  <rect x="120" y="500" width="960" height="190" rx="28" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>

  <!-- laptop -->
  <rect x="200" y="300" width="380" height="220" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="235" y="335" width="310" height="150" rx="16" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.10)"/>
  <path d="M240 410 H540" stroke="rgba(255,255,255,0.20)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M240 450 H470" stroke="rgba(255,255,255,0.18)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- breadboard + wires -->
  <rect x="660" y="330" width="360" height="160" rx="22" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="705" y="365" width="140" height="90" rx="14" fill="rgba(0,0,0,0.20)" stroke="rgba(255,255,255,0.10)"/>
  <circle cx="900" cy="410" r="34" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)"/>
  <path d="M780 340 C820 290, 890 290, 940 340" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="6" stroke-linecap="round"/>
  <path d="M720 488 C780 540, 880 540, 960 488" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6" stroke-linecap="round"/>

  <!-- subtle caption bars -->
  <rect x="80" y="80" width="420" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="80" y="112" width="300" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
</svg>
