  <path d="M320 560 C380 520, 450 520, 520 560" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="8" stroke-linecap="round"/>
  <path d="M560 560 C620 500, 700 500, 780 560" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="8" stroke-linecap="round"/>
  <path d="M820 560 C880 520, 960 520, 1000 560" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="8" stroke-linecap="round"/>

  <!-- subtle caption bars -->
