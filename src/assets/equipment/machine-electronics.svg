    <circle cx="280" cy="360" r="7"/>
    <circle cx="340" cy="360" r="7"/>
    <circle cx="400" cy="360" r="7"/>
    <circle cx="460" cy="360" r="7"/>
    <circle cx="520" cy="360" r="7"/>
    <circle cx="580" cy="360" r="7"/>
    <circle cx="640" cy="360" r="7"/>
    <circle cx="700" cy="360" r="7"/>
    <circle cx="760" cy="360" r="7"/>
    <circle cx="820" cy="360" r="7"/>
    <circle cx="880" cy="360" r="7"/>

    <circle cx="280" cy="420" r="7"/>
    <circle cx="340" cy="420" r="7"/>
    <circle cx="400" cy="420" r="7"/>
    <circle cx="460" cy="420" r="7"/>
    <circle cx="520" cy="420" r="7"/>
    <circle cx="580" cy="420" r="7"/>
    <circle cx="640" cy="420" r="7"/>
    <circle cx="700" cy="420" r="7"/>
    <circle cx="760" cy="420" r="7"/>
    <circle cx="820" cy="420" r="7"/>
    <circle cx="880" cy="420" r="7"/>

    <circle cx="280" cy="480" r="7"/>
    <circle cx="340" cy="480" r="7"/>
    <circle cx="400" cy="480" r="7"/>
    <circle cx="460" cy="480" r="7"/>
    <circle cx="520" cy="480" r="7"/>
    <circle cx="580" cy="480" r="7"/>
    <circle cx="640" cy="480" r="7"/>
    <circle cx="700" cy="480" r="7"/>
    <circle cx="760" cy="480" r="7"/>
