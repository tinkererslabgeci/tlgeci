<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="28" fill="url(#bg)"/>

  <!-- frame -->
  <rect x="320" y="130" width="560" height="560" rx="30" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="370" y="180" width="460" height="360" rx="26" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.10)"/>

  <!-- gantry + nozzle -->
  <path d="M395 255 H805" stroke="rgba(255,255,255,0.18)" stroke-width="14" stroke-linecap="round"/>
  <rect x="560" y="255" width="80" height="90" rx="16" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
  <path d="M600 345 L600 392" stroke="rgba(255,255,255,0.26)" stroke-width="10" stroke-linecap="round"/>

  <!-- print bed -->
  <rect x="410" y="470" width="380" height="90" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)"/>
  <g opacity="0.25" stroke="rgba(255,255,255,0.20)" stroke-width="1">
    <path d="M440 498 H760"/>
    <path d="M440 528 H760"/>
    <path d="M480 485 V555"/>
    <path d="M540 485 V555"/>
    <path d="M600 485 V555"/>
    <path d="M660 485 V555"/>
    <path d="M720 485 V555"/>
  </g>

  <!-- base + knob -->
  <rect x="320" y="690" width="560" height="60" rx="20" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
  <circle cx="820" cy="720" r="18" fill="rgba(255,255,255,0.10)"/>

  <!-- subtle caption bars -->
  <rect x="80" y="80" width="420" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="80" y="112" width="300" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
</svg>
