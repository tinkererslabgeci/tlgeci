<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="28" fill="url(#bg)"/>

  <!-- whiteboard -->
  <rect x="140" y="120" width="920" height="260" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  <rect x="190" y="170" width="560" height="160" rx="18" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>
  <path d="M220 250 H720" stroke="rgba(255,255,255,0.18)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M220 290 H620" stroke="rgba(255,255,255,0.16)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M820 170 H1010" stroke="rgba(255,255,255,0.14)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <path d="M820 210 H980" stroke="rgba(255,255,255,0.14)" stroke-width="6" stroke-linecap="round" opacity="0.6"/>

  <!-- table -->
  <rect x="120" y="520" width="960" height="160" rx="28" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>

  <!-- people silhouettes -->
  <g fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.12)" stroke-width="2">
    <circle cx="300" cy="470" r="44"/>
    <rect x="250" y="520" width="100" height="140" rx="34"/>

    <circle cx="520" cy="460" r="48"/>
    <rect x="465" y="515" width="110" height="150" rx="38"/>

    <circle cx="740" cy="470" r="44"/>
    <rect x="690" y="520" width="100" height="140" rx="34"/>

    <circle cx="920" cy="480" r="40"/>
    <rect x="875" y="525" width="90" height="135" rx="32"/>
  </g>

  <!-- subtle caption bars -->
  <rect x="80" y="720" width="420" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="80" y="752" width="300" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
</svg>
