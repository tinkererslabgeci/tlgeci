<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="28" fill="url(#bg)"/>

  <!-- vinyl cutter body -->
  <rect x="140" y="240" width="920" height="320" rx="34" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  <rect x="190" y="290" width="820" height="120" rx="26" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.10)"/>

  <!-- rollers -->
  <g fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.14)" stroke-width="2">
    <circle cx="260" cy="450" r="22"/>
    <circle cx="360" cy="450" r="22"/>
    <circle cx="460" cy="450" r="22"/>
    <circle cx="560" cy="450" r="22"/>
    <circle cx="660" cy="450" r="22"/>
    <circle cx="760" cy="450" r="22"/>
    <circle cx="860" cy="450" r="22"/>
    <circle cx="960" cy="450" r="22"/>
  </g>

  <!-- cutting head rail -->
  <path d="M220 330 H980" stroke="rgba(255,255,255,0.18)" stroke-width="12" stroke-linecap="round"/>
  <rect x="560" y="315" width="90" height="70" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>

  <!-- feed -->
  <path d="M220 570 H980" stroke="rgba(255,255,255,0.10)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- subtle caption bars -->
  <rect x="80" y="80" width="420" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="80" y="112" width="300" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
</svg>
