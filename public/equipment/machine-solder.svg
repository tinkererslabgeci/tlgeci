<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="800" rx="28" fill="url(#bg)"/>
  <rect x="60" y="560" width="1080" height="170" rx="22" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.10)"/>

  <!-- soldering station base -->
  <rect x="150" y="340" width="520" height="210" rx="26" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  <rect x="185" y="380" width="220" height="120" rx="16" fill="rgba(0,0,0,0.20)" stroke="rgba(255,255,255,0.10)"/>
  <circle cx="470" cy="440" r="44" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.14)"/>
  <circle cx="470" cy="440" r="18" fill="rgba(255,255,255,0.10)"/>

  <!-- iron holder + tip -->
  <rect x="740" y="360" width="250" height="60" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.10)"/>
  <path d="M780 340 L1030 260" stroke="url(#metal)" stroke-width="18" stroke-linecap="round"/>
  <path d="M1030 260 L1110 225" stroke="rgba(255,255,255,0.22)" stroke-width="12" stroke-linecap="round"/>
  <path d="M1110 225 L1132 215" stroke="rgba(255,255,255,0.30)" stroke-width="8" stroke-linecap="round"/>

  <!-- coiled wire -->
  <path d="M365 520 C420 565, 520 565, 575 520" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6" stroke-linecap="round"/>
  <path d="M360 500 C420 545, 520 545, 580 500" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6" stroke-linecap="round"/>

  <!-- subtle caption bars -->
  <rect x="80" y="80" width="420" height="18" rx="9" fill="rgba(255,255,255,0.10)"/>
  <rect x="80" y="112" width="300" height="14" rx="7" fill="rgba(255,255,255,0.08)"/>
</svg>
